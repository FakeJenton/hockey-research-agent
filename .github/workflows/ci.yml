name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests (client, similarity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -q
      # dbt compile-time validation only: no warehouse credentials in CI,
      # so this parses models/tests/refs without connecting to BigQuery
      - run: dbt parse --project-dir dbt --profiles-dir .github/dbt-ci

  web:
    name: Web (typecheck, SQL guardrail tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      # npm install rather than npm ci: the lockfile is generated on Windows,
      # and npm omits linux-only optional deps (@emnapi/* fallbacks for oxide/
      # sharp) from it, which strict ci rejects on ubuntu runners
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npx vitest run
